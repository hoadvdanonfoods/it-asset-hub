{% extends 'base.html' %}
{% block title %}In QR hàng loạt{% endblock %}
{% block content %}
<div class="max-w-7xl mx-auto">
  <div class="flex items-center justify-between mb-6 no-print">
    <a href="/assets/" class="px-4 py-2 rounded-xl bg-surface-container-highest text-on-surface font-bold text-sm">Quay lại danh sách</a>
    <button onclick="window.print()" class="px-5 py-2.5 rounded-xl bg-primary text-white font-bold text-sm">In tất cả QR</button>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    {% for item in items %}
    <div class="bg-white rounded-3xl shadow-sm border border-outline-variant/10 p-4 text-center break-inside-avoid print-card">
      <div class="inline-block p-2 border rounded-2xl bg-white mb-3">
        <img src="{{ item.qr_url }}" alt="QR" class="w-44 h-44 mx-auto">
      </div>
      <div class="text-sm font-extrabold text-slate-900 tracking-tight">{{ item.asset.asset_code }}</div>
    </div>
    {% endfor %}
  </div>
</div>
<style>
.break-inside-avoid { break-inside: avoid; page-break-inside: avoid; }
@media print {
  @page { size: auto; margin: 8mm; }
  .no-print, header, aside, nav { display:none !important; }
  body { background:white !important; }
  .print-card { box-shadow:none !important; }
}
</style>
{% endblock %}
