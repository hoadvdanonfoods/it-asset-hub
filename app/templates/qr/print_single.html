{% extends 'base.html' %}
{% block title %}In QR - {{ asset.asset_code }}{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
  <div class="flex items-center justify-between mb-6 no-print">
    <a href="/assets/{{ asset.id }}" class="px-4 py-2 rounded-xl bg-surface-container-highest text-on-surface font-bold text-sm">Quay lại</a>
    <button onclick="window.print()" class="px-5 py-2.5 rounded-xl bg-primary text-white font-bold text-sm">In QR</button>
  </div>

  <div class="bg-white rounded-3xl shadow-sm border border-outline-variant/10 p-8 text-center print-card mx-auto" style="max-width: 320px;">
    <div class="inline-block p-3 border rounded-2xl bg-white mb-4">
      <img src="{{ qr_url }}" alt="QR" class="w-56 h-56">
    </div>
    <div class="text-xl font-extrabold text-slate-900 tracking-tight">{{ asset.asset_code }}</div>
  </div>
</div>
<style>
@media print {
  @page { size: auto; margin: 0; }
  .no-print, header, aside, nav { display:none !important; }
  body { background:white !important; }
  main, .max-w-2xl { max-width:none !important; margin:0 !important; padding:0 !important; }
  .print-card {
    box-shadow:none !important;
    border:none !important;
    margin: 0 auto !important;
    padding: 8mm 6mm !important;
    width: 70mm !important;
    max-width: 70mm !important;
  }
}
</style>
{% endblock %}
