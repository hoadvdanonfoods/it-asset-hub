{% extends 'base.html' %}
{% block content %}
<h1 class="mb-3">{% if item %}Cập nhật bảo trì{% else %}Ghi nhận bảo trì{% endif %}</h1>
<form class="card card-body bg-white" method="post">
  <div class="row g-3">
    <div class="col-md-6">
      <label class="form-label">Thiết bị</label>
      <select class="form-select" name="asset_id" required>
        {% for asset in assets %}<option value="{{ asset.id }}" {% if item and item.asset_id == asset.id %}selected{% endif %}>{{ asset.asset_code }} - {{ asset.asset_name }}</option>{% endfor %}
      </select>
    </div>
    <div class="col-md-3"><label class="form-label">Ngày bảo trì</label><input class="form-control" type="date" name="maintenance_date" value="{{ item.maintenance_date if item else '' }}" required></div>
    <div class="col-md-3"><label class="form-label">Kỹ thuật viên</label><input class="form-control" name="technician" value="{{ item.technician if item else '' }}"></div>
    <div class="col-md-3"><label class="form-label">Chi phí</label><input class="form-control" type="number" step="0.01" name="cost" value="{{ item.cost if item and item.cost is not none else '' }}"></div>
    <div class="col-md-3"><label class="form-label">Ngày bảo trì tiếp theo</label><input class="form-control" type="date" name="next_maintenance_date" value="{{ item.next_maintenance_date if item and item.next_maintenance_date else '' }}"></div>
    <div class="col-12"><label class="form-label">Nội dung</label><textarea class="form-control" name="description" rows="4" required>{{ item.description if item else '' }}</textarea></div>
    <div class="col-12"><label class="form-label">Kết quả</label><textarea class="form-control" name="result" rows="3">{{ item.result if item else '' }}</textarea></div>
  </div>
  <div class="mt-3 d-flex gap-2"><button class="btn btn-success">{% if item %}Cập nhật bảo trì{% else %}Lưu bảo trì{% endif %}</button><a class="btn btn-secondary" href="/maintenance/">Quay lại</a></div>
</form>
{% endblock %}
