{% extends 'base.html' %}
{% block content %}
<h1 class="mb-3">Đổi mật khẩu</h1>
{% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
{% if force_change %}<div class="alert alert-warning">Bạn đang dùng mật khẩu mặc định. Hệ thống yêu cầu đổi mật khẩu trước khi tiếp tục.</div>{% endif %}
<form class="card card-body bg-white" method="post">
  <input type="hidden" name="force" value="{{ '1' if force_change else '' }}">
  <div class="mb-3"><label class="form-label">Mật khẩu cũ</label><input class="form-control" type="password" name="old_password" required></div>
  <div class="mb-3"><label class="form-label">Mật khẩu mới</label><input class="form-control" type="password" name="new_password" required></div>
  <div class="mb-3"><label class="form-label">Nhập lại mật khẩu mới</label><input class="form-control" type="password" name="confirm_new_password" required></div>
  <button class="btn btn-primary">Cập nhật mật khẩu</button>
</form>
{% endblock %}
